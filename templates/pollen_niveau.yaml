---
# Pollen niveauer
# Klassifikation efter tærskler brugt i pollen_dk:
# Alternaria: 20 / 100 / 500
# Birk: 30 / 100 / 550
# Bynke: 10 / 50 / 60
# Cladosporium: 2000 / 6000 / 7000
# El: 10 / 50 / 200
# Elm: 10 / 50 / 80
# Græs: 10 / 50 / 150
# Hassel: 5 / 15 / 40

- sensor:
    - name: "Alternaria pollen niveau"
      unique_id: alternaria_pollen_niveau_v5
      state: >-
        {% set v = states('sensor.alternaria_pollen_seneste') | int(-1) %}
        {% if v < 0 %}Ukendt
        {% elif v < 20 %}Lav
        {% elif v < 100 %}Moderat
        {% else %}Høj
        {% endif %}

    - name: "Birk pollen niveau"
      unique_id: birk_pollen_niveau_v5
