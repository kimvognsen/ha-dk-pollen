type: vertical-stack
cards:
  - type: markdown
    content: |-

      https://www.astma-allergi.dk/dagens-pollental/?s=
    title: Se dagens pollental
  - type: custom:layout-card
    layout_type: custom:grid-layout
    layout:
      grid-template-columns: repeat(2, 1fr)
      grid-auto-flow: row
    cards:
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.vis_birk_chip
            state: "True"
        card:
          type: custom:mushroom-template-card
          entity: sensor.birk_pollen_niveau
          primary: >
            Birk: {{ states('sensor.birk_pollen_niveau') }} {% set t =
            states('sensor.birk_pollen_seneste') %} {% if t not in ['unknown',
            'unavailable', 'none', None] %} ({{ t }}) {% endif %}
          icon: mdi:tree
          icon_color: >
            {% set s = states('sensor.birk_pollen_niveau') %} {% if s == 'Lav'
            %} green {% elif s == 'Middel' %} amber {% elif s == 'Høj' %} red {%
            else %} grey {% endif %}
