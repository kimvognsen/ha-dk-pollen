---
# Pollen - Astma-Allergi Danmark
# Region:
# 48 = Øst for Storebælt
# 49 = Vest for Storebælt

- resource: https://www.astma-allergi.dk/umbraco/Api/PollenApi/GetPollenFeed
  scan_interval: 3600
  sensor:
    - name: "Alternaria pollen seneste"
      unique_id: alternaria_seneste_v5
      icon: mdi:bacteria
      state_class: measurement
      unit_of_measurement: "pollen"
      value_template: >-
        {% set data = value_json | from_json if value_json is string else value_json %}
        {{ data.fields['48'].mapValue.fields.data.mapValue.fields['44'].mapValue.fields.level.integerValue | int(-1) }}

    - name: "Birk pollen seneste"
      unique_id: birk_pollen_seneste_v5
      icon: mdi:tree
